<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Omok Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            min-height: 100vh;
        }

        .container {
            background: white;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 95vw;
            max-height: 95vh;
            display: flex;
            flex-direction: column;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: clamp(1.5em, 5vw, 2.5em);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
            width: 100%;
        }

        label {
            font-size: clamp(0.9em, 3vw, 1em);
        }

        select, button {
            padding: 10px 12px;
            font-size: clamp(0.85em, 2.5vw, 1em);
            border: 2px solid #667eea;
            border-radius: 5px;
            cursor: pointer;
            background: white;
            color: #333;
            flex-shrink: 0;
            -webkit-appearance: none;
            appearance: none;
            touch-action: manipulation;
        }

        select {
            padding-right: 30px;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 8px center;
            background-size: 20px;
            padding-right: 35px;
        }

        button {
            background: #667eea;
            color: white;
            font-weight: bold;
            transition: 0.2s;
        }

        button:active {
            background: #764ba2;
            transform: scale(0.95);
        }

        .status {
            text-align: center;
            font-size: clamp(0.95em, 3vw, 1.2em);
            margin-bottom: 10px;
            font-weight: bold;
            color: #667eea;
            min-height: 1.5em;
        }

        .board-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            min-height: 0;
            margin-bottom: 10px;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            gap: 0;
            background: #DEB887;
            padding: 8px;
            border-radius: 10px;
            aspect-ratio: 1;
            width: 100%;
            max-width: 95vw;
            max-height: calc(95vh - 200px);
        }

        .cell {
            aspect-ratio: 1;
            border: 1px solid #8B7355;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: clamp(12px, 4vw, 24px);
            cursor: pointer;
            background: rgba(255, 255, 255, 0.3);
            transition: 0.1s;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }

        .cell:active {
            background: rgba(102, 126, 234, 0.4);
            transform: scale(0.95);
        }

        .cell:hover {
            background: rgba(102, 126, 234, 0.2);
        }

        .result {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            display: none;
            margin-top: 10px;
            width: 100%;
        }

        .result.show {
            display: block;
        }

        .result h2 {
            color: #333;
            margin-bottom: 12px;
            font-size: clamp(1.2em, 4vw, 1.8em);
        }

        .result button {
            padding: 12px 20px;
            font-size: clamp(0.9em, 3vw, 1em);
        }

        /* Landscape mode adjustments */
        @media (orientation: landscape) {
            .container {
                padding: 10px;
                max-height: 100vh;
            }

            h1 {
                margin-bottom: 5px;
                font-size: clamp(1.2em, 4vh, 1.8em);
            }

            .controls {
                gap: 8px;
                margin-bottom: 8px;
            }

            .status {
                margin-bottom: 8px;
                font-size: clamp(0.8em, 2.5vh, 1em);
            }

            .board {
                padding: 6px;
                max-height: calc(100vh - 150px);
            }

            .cell {
                font-size: clamp(10px, 3.5vh, 20px);
            }
        }

        /* Small screens (phones) */
        @media (max-width: 480px) {
            body {
                padding: 5px;
            }

            .container {
                padding: 10px;
                border-radius: 10px;
            }

            h1 {
                margin-bottom: 8px;
                font-size: 1.4em;
            }

            .controls {
                gap: 8px;
                margin-bottom: 8px;
            }

            select, button {
                padding: 8px 10px;
                font-size: 0.9em;
            }

            .board {
                padding: 6px;
                max-width: 100vw;
            }

            .cell {
                border: 0.5px solid #8B7355;
                font-size: 16px;
            }
        }

        /* Prevent zoom on double-tap */
        input, button, select {
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Omok with AI</h1>
        
        <div class="controls">
            <label for="difficulty">Difficulty:</label>
            <select id="difficulty">
                <option value="easy">Easy</option>
                <option value="medium" selected>Medium</option>
                <option value="hard">Hard</option>
            </select>
            <button id="newGameBtn">New Game</button>
        </div>

        <div class="status">
            <p id="gameStatus">Your Turn (Black●)</p>
        </div>

        <div class="board-container">
            <div class="board" id="board"></div>
        </div>

        <div class="result" id="result">
            <h2 id="resultText"></h2>
            <button onclick="location.reload()">Play Again</button>
        </div>
    </div>

    <script>
        class AI {
            constructor(difficulty = 'medium') {
                this.difficulty = difficulty;
            }

            setDifficulty(difficulty) {
                this.difficulty = difficulty;
            }

            getBestMove(board) {
                const empty = this.getEmptyMoves(board);
                if (empty.length === 0) return null;

                if (this.difficulty === 'easy') {
                    return this.getEasyMove(board, empty);
                } else if (this.difficulty === 'medium') {
                    return this.getMediumMove(board, empty);
                } else {
                    return this.getHardMove(board, empty);
                }
            }

            getEmptyMoves(board) {
                const empty = [];
                for (let r = 0; r < 15; r++) {
                    for (let c = 0; c < 15; c++) {
                        if (board[r][c] === null) empty.push({r, c});
                    }
                }
                return empty;
            }

            getEasyMove(board, empty) {
                for (let move of empty) {
                    if (this.getLineScore(board, move.r, move.c, 'player') >= 4) {
                        return move;
                    }
                }
                return empty[Math.floor(Math.random() * empty.length)];
            }

            getMediumMove(board, empty) {
                let best = null;
                let bestScore = -999999;

                for (let move of empty) {
                    let score = 0;

                    if (this.getLineScore(board, move.r, move.c, 'ai') >= 4) {
                        return move;
                    }

                    if (this.getLineScore(board, move.r, move.c, 'player') >= 4) {
                        score = 5000;
                    } else {
                        score += this.getLineScore(board, move.r, move.c, 'ai') * 100;
                        score += this.getLineScore(board, move.r, move.c, 'player') * 50;
                    }

                    if (score > bestScore) {
                        bestScore = score;
                        best = move;
                    }
                }

                return best;
            }

            getHardMove(board, empty) {
                let winning = [];
                let blocking = [];
                let attacking = [];
                let defensive = [];

                for (let move of empty) {
                    const aiScore = this.getLineScore(board, move.r, move.c, 'ai');
                    const playerScore = this.getLineScore(board, move.r, move.c, 'player');

                    if (aiScore >= 4) {
                        winning.push({ move, score: aiScore * 1000 });
                    }
                    else if (playerScore >= 3) {
                        blocking.push({ move, score: playerScore * 500 });
                    }
                    else if (aiScore >= 3) {
                        attacking.push({ move, score: aiScore * 200 + this.getOpenness(board, move.r, move.c, 'ai') });
                    }
                    else {
                        const score = aiScore * 100 + playerScore * 50 + this.proximity(board, move.r, move.c) * 10;
                        defensive.push({ move, score });
                    }
                }

                if (winning.length > 0) {
                    winning.sort((a, b) => b.score - a.score);
                    return winning[0].move;
                }
                if (blocking.length > 0) {
                    blocking.sort((a, b) => b.score - a.score);
                    return blocking[0].move;
                }
                if (attacking.length > 0) {
                    attacking.sort((a, b) => b.score - a.score);
                    return attacking[0].move;
                }
                if (defensive.length > 0) {
                    defensive.sort((a, b) => b.score - a.score);
                    return defensive[0].move;
                }

                return empty[0];
            }

            getLineScore(board, r, c, player) {
                const dirs = [[0,1], [1,0], [1,1], [1,-1]];
                let maxScore = 0;

                for (let [dr, dc] of dirs) {
                    let count = 1;

                    for (let i = 1; i < 5; i++) {
                        let nr = r + dr * i, nc = c + dc * i;
                        if (nr >= 0 && nr < 15 && nc >= 0 && nc < 15 && board[nr][nc] === player) {
                            count++;
                        } else break;
                    }

                    for (let i = 1; i < 5; i++) {
                        let nr = r - dr * i, nc = c - dc * i;
                        if (nr >= 0 && nr < 15 && nc >= 0 && nc < 15 && board[nr][nc] === player) {
                            count++;
                        } else break;
                    }

                    maxScore = Math.max(maxScore, count);
                }

                return maxScore;
            }

            getOpenness(board, r, c, player) {
                const dirs = [[0,1], [1,0], [1,1], [1,-1]];
                let totalOpenness = 0;

                for (let [dr, dc] of dirs) {
                    let openCount = 0;
                    
                    if (this.isValid(r + dr, c + dc) && board[r + dr][c + dc] === player) {
                        openCount++;
                    }
                    
                    if (this.isValid(r - dr, c - dc) && board[r - dr][c - dc] === player) {
                        openCount++;
                    }

                    totalOpenness += openCount;
                }

                return totalOpenness;
            }

            proximity(board, r, c) {
                let count = 0;
                for (let dr = -2; dr <= 2; dr++) {
                    for (let dc = -2; dc <= 2; dc++) {
                        if (dr === 0 && dc === 0) continue;
                        let nr = r + dr, nc = c + dc;
                        if (this.isValid(nr, nc) && board[nr][nc] !== null) {
                            count += (3 - Math.max(Math.abs(dr), Math.abs(dc)));
                        }
                    }
                }
                return count;
            }

            isValid(r, c) {
                return r >= 0 && r < 15 && c >= 0 && c < 15;
            }

            checkWin(board, r, c, player) {
                return this.getLineScore(board, r, c, player) >= 5;
            }
        }
