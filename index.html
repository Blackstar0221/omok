<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omok Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 650px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        select, button {
            padding: 10px 15px;
            font-size: 16px;
            border: 2px solid #667eea;
            border-radius: 5px;
            cursor: pointer;
            background: white;
            color: #333;
        }

        button {
            background: #667eea;
            color: white;
            font-weight: bold;
        }

        button:hover {
            background: #764ba2;
        }

        .status {
            text-align: center;
            font-size: 18px;
            margin-bottom: 20px;
            font-weight: bold;
            color: #667eea;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            gap: 0;
            margin-bottom: 20px;
            background: #DEB887;
            padding: 10px;
            border-radius: 10px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .cell {
            aspect-ratio: 1;
            border: 1px solid #8B7355;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            cursor: pointer;
            user-select: none;
        }

        .cell:hover {
            background: rgba(102, 126, 234, 0.2);
        }

        .result {
            background: #f0f0f0;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            display: none;
            margin-top: 20px;
        }

        .result.show {
            display: block;
        }

        .result h2 {
            color: #333;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Omok with AI</h1>
        
        <div class="controls">
            <label for="difficulty">Difficulty:</label>
            <select id="difficulty">
                <option value="easy">Easy</option>
                <option value="medium" selected>Medium</option>
                <option value="hard">Hard</option>
            </select>
            <button id="newGameBtn">New Game</button>
        </div>

        <div class="status">
            <p id="gameStatus">Your Turn (Black●)</p>
        </div>

        <div class="board" id="board"></div>

        <div class="result" id="result">
            <h2 id="resultText"></h2>
            <button onclick="location.reload()">Play Again</button>
        </div>
    </div>

    <script>
        class AI {
            constructor(difficulty = 'medium') {
                this.difficulty = difficulty;
            }

            setDifficulty(difficulty) {
                this.difficulty = difficulty;
            }

            getBestMove(board) {
                const empty = this.getEmptyMoves(board);
                if (empty.length === 0) return null;

                if (this.difficulty === 'easy') {
                    return this.getEasyMove(board, empty);
                } else if (this.difficulty === 'medium') {
                    return this.getMediumMove(board, empty);
                } else {
                    return this.getHardMove(board, empty);
                }
            }

            getEmptyMoves(board) {
                const empty = [];
                for (let r = 0; r < 15; r++) {
                    for (let c = 0; c < 15; c++) {
                        if (board[r][c] === null) empty.push({r, c});
                    }
                }
                return empty;
            }

            getEasyMove(board, empty) {
                // Easy: Random moves, sometimes blocks
                for (let move of empty) {
                    if (this.checkWin(board, move.r, move.c, 'player')) {
                        return move;
                    }
                }
                return empty[Math.floor(Math.random() * empty.length)];
            }

            getMediumMove(board, empty) {
                // Medium: Looks 1-2 moves ahead
                let best = null;
                let bestScore = -999999;

                for (let move of empty) {
                    let score = this.evaluateMove(board, move.r, move.c);
                    if (score > bestScore) {
                        bestScore = score;
                        best = move;
                    }
                }

                return best;
            }

            getHardMove(board, empty) {
                // Hard: Looks 2-3 moves ahead with minimax
                let best = null;
                let bestScore = -999999;

                for (let move of empty) {
                    // Check if AI can win
                    if (this.checkWin(board, move.r, move.c, 'ai')) {
                        return move;
                    }

                    // Check if need to block player
                    if (this.checkWin(board, move.r, move.c, 'player')) {
                        best = move;
                        bestScore = 5000;
                        continue;
                    }

                    // Look ahead 1 move
                    const boardCopy = this.copyBoard(board);
                    boardCopy[move.r][move.c] = 'ai';
                    
                    let score = this.evaluateMove(boardCopy, move.r, move.c) * 2;

                    // Check what player could do next
                    const playerMoves = this.getEmptyMoves(boardCopy);
                    let playerThreat = 0;
                    
                    for (let pMove of playerMoves) {
                        if (this.checkWin(boardCopy, pMove.r, pMove.c, 'player')) {
                            playerThreat += 1000;
                        }
                        playerThreat += this.countConsecutive(boardCopy, pMove.r, pMove.c, 'player');
                    }

                    score -= playerThreat * 0.5;

                    if (score > bestScore) {
                        bestScore = score;
                        best = move;
                    }
                }

                return best || empty[0];
            }

            evaluateMove(board, r, c) {
                let score = 0;

                // Winning move
                if (this.checkWin(board, r, c, 'ai')) return 10000;

                // Blocking move
                if (this.checkWin(board, r, c, 'player')) score += 5000;

                // Count consecutive pieces
                score += this.countConsecutive(board, r, c, 'ai') * 100;
                score += this.countConsecutive(board, r, c, 'player') * 80;

                // Distance from center (prefer center)
                const distFromCenter = Math.abs(r - 7) + Math.abs(c - 7);
                score += (14 - distFromCenter) * 5;

                // Proximity to other pieces
                for (let dr = -3; dr <= 3; dr++) {
                    for (let dc = -3; dc <= 3; dc++) {
                        if (dr === 0 && dc === 0) continue;
                        let nr = r + dr, nc = c + dc;
                        if (nr >= 0 && nr < 15 && nc >= 0 && nc < 15) {
                            if (board[nr][nc] === 'ai') score += 20;
                            if (board[nr][nc] === 'player') score += 15;
                        }
                    }
                }

                return score;
            }

            countConsecutive(board, r, c, player) {
                const dirs = [[0,1], [1,0], [1,1], [1,-1]];
                let maxCount = 0;

                for (let [dr, dc] of dirs) {
                    let count = 1;
                    
                    // Count in positive direction
                    for (let i = 1; i < 5; i++) {
                        let nr = r + dr * i, nc = c + dc * i;
                        if (nr >= 0 && nr < 15 && nc >= 0 && nc < 15 && board[nr][nc] === player) {
                            count++;
                        } else break;
                    }
                    
                    // Count in negative direction
                    for (let i = 1; i < 5; i++) {
                        let nr = r - dr * i, nc = c - dc * i;
                        if (nr >= 0 && nr < 15 && nc >= 0 && nc < 15 && board[nr][nc] === player) {
                            count++;
                        } else break;
                    }

                    maxCount = Math.max(maxCount, count);
                }

                return maxCount;
            }

            checkWin(board, r, c, player) {
                const dirs = [[0,1], [1,0], [1,1], [1,-1]];
                
                for (let [dr, dc] of dirs) {
                    let count = 1;
                    
                    for (let i = 1; i < 5; i++) {
                        let nr = r + dr * i, nc = c + dc * i;
                        if (nr >= 0 && nr < 15 && nc >= 0 && nc < 15 && board[nr][nc] === player) {
                            count++;
                        } else break;
                    }
                    
                    for (let i = 1; i < 5; i++) {
                        let nr = r - dr * i, nc = c - dc * i;
                        if (nr >= 0 && nr < 15 && nc >= 0 && nc < 15 && board[nr][nc] === player) {
                            count++;
                        } else break;
                    }

                    if (count >= 5) return true;
                }

                return false;
            }

            copyBoard(board) {
                return board.map(row => [...row]);
            }
        }

        class Game {
            constructor() {
                this.board = Array(15).fill(null).map(() => Array(15).fill(null));
                this.ai = new AI('medium');
                this.gameOver = false;
                this.turn = 'player';
                this.render();
                this.attachListeners();
            }

            attachListeners() {
                document.getElementById('newGameBtn').addEventListener('click', () => this.reset());
                document.getElementById('difficulty').addEventListener('change', (e) => {
                    this.ai.setDifficulty(e.target.value);
                });
            }

            reset() {
                this.board = Array(15).fill(null).map(() => Array(15).fill(null));
                this.gameOver = false;
                this.turn = 'player';
                document.getElementById('result').classList.remove('show');
                this.render();
                this.updateStatus('Your Turn (Black●)');
            }

            render() {
                const boardEl = document.getElementById('board');
                boardEl.innerHTML = '';

                for (let r = 0; r < 15; r++) {
                    for (let c = 0; c < 15; c++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        
                        if (this.board[r][c] === 'player') {
                            cell.textContent = '●';
                        } else if (this.board[r][c] === 'ai') {
                            cell.textContent = '○';
                        }

                        cell.addEventListener('click', () => this.playerMove(r, c));
                        boardEl.appendChild(cell);
                    }
                }
            }

            playerMove(r, c) {
                if (this.gameOver || this.board[r][c] !== null || this.turn !== 'player') return;

                this.board[r][c] = 'player';
                this.render();

                if (this.ai.checkWin(this.board, r, c, 'player')) {
                    this.endGame('🎉 You Win!');
                    return;
                }

                this.turn = 'ai';
                this.updateStatus('AI is thinking...');
                setTimeout(() => this.aiMove(), 500);
            }

            aiMove() {
                const move = this.ai.getBestMove(this.board);
                if (!move) {
                    this.endGame('Draw!');
                    return;
                }

                this.board[move.r][move.c] = 'ai';
                this.render();

                if (this.ai.checkWin(this.board, move.r, move.c, 'ai')) {
                    this.endGame('💀 AI Wins!');
                    return;
                }

                this.turn = 'player';
                this.updateStatus('Your Turn (Black●)');
            }

            endGame(msg) {
                this.gameOver = true;
                document.getElementById('resultText').textContent = msg;
                document.getElementById('result').classList.add('show');
            }

            updateStatus(msg) {
                document.getElementById('gameStatus').textContent = msg;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new Game();
        });
    </script>
</body>
</html>
