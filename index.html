<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omok Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        .container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 15px;
            font-size: 1.8em;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        label {
            font-size: 1em;
            display: flex;
            align-items: center;
        }

        select, button {
            padding: 10px 15px;
            font-size: 1em;
            border: 2px solid #667eea;
            border-radius: 5px;
            cursor: pointer;
            background: white;
            color: #333;
        }

        button {
            background: #667eea;
            color: white;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover {
            background: #764ba2;
        }

        button:active {
            transform: scale(0.95);
        }

        .status {
            text-align: center;
            font-size: 1.1em;
            margin-bottom: 15px;
            font-weight: bold;
            color: #667eea;
            height: 30px;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            gap: 0;
            background: #DEB887;
            padding: 8px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .cell {
            aspect-ratio: 1;
            border: 1px solid #8B7355;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.3);
            transition: 0.1s;
            user-select: none;
            -webkit-user-select: none;
        }

        .cell:hover {
            background: rgba(102, 126, 234, 0.2);
        }

        .cell:active {
            background: rgba(102, 126, 234, 0.4);
            transform: scale(0.95);
        }

        .result {
            background: #f0f0f0;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            display: none;
            margin-top: 15px;
        }

        .result.show {
            display: block;
        }

        .result h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.5em;
        }

        .result button {
            padding: 12px 25px;
            font-size: 1em;
        }

        @media (max-width: 480px) {
            .container {
                padding: 15px;
            }

            h1 {
                font-size: 1.5em;
                margin-bottom: 10px;
            }

            .controls {
                gap: 8px;
                margin-bottom: 10px;
            }

            .status {
                margin-bottom: 10px;
                font-size: 0.95em;
                height: 25px;
            }

            .board {
                padding: 6px;
                margin-bottom: 10px;
            }

            .cell {
                font-size: 16px;
                border: 0.5px solid #8B7355;
            }

            select, button {
                padding: 8px 12px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Omok</h1>
        
        <div class="controls">
            <label for="difficulty">Difficulty:</label>
            <select id="difficulty">
                <option value="easy">Easy</option>
                <option value="medium" selected>Medium</option>
                <option value="hard">Hard</option>
            </select>
            <button id="newGameBtn">New Game</button>
        </div>

        <div class="status" id="gameStatus">Your Turn</div>

        <div class="board" id="board"></div>

        <div class="result" id="result">
            <h2 id="resultText"></h2>
            <button onclick="location.reload()">Play Again</button>
        </div>
    </div>

    <script>
        class AI {
            constructor(difficulty = 'medium') {
                this.difficulty = difficulty;
            }

            setDifficulty(difficulty) {
                this.difficulty = difficulty;
            }

            getBestMove(board) {
                const empty = this.getEmptyMoves(board);
                if (empty.length === 0) return null;

                if (this.difficulty === 'easy') {
                    return this.getEasyMove(board, empty);
                } else if (this.difficulty === 'medium') {
                    return this.getMediumMove(board, empty);
                } else {
                    return this.getHardMove(board, empty);
                }
            }

            getEmptyMoves(board) {
                const empty = [];
                for (let r = 0; r < 15; r++) {
                    for (let c = 0; c < 15; c++) {
                        if (board[r][c] === null) empty.push({r, c});
                    }
                }
                return empty;
            }

            getEasyMove(board, empty) {
                for (let move of empty) {
                    if (this.getLineScore(board, move.r, move.c, 'player') >= 4) {
                        return move;
                    }
                }
                return empty[Math.floor(Math.random() * empty.length)];
            }

            getMediumMove(board, empty) {
                let best = null;
                let bestScore = -999999;

                for (let move of empty) {
                    let score = 0;

                    if (this.getLineScore(board, move.r, move.c, 'ai') >= 4) {
                        return move;
                    }

                    if (this.getLineScore(board, move.r, move.c, 'player') >= 4) {
                        score = 5000;
                    } else {
                        score += this.getLineScore(board, move.r, move.c, 'ai') * 100;
                        score += this.getLineScore(board, move.r, move.c, 'player') * 50;
                    }

                    if (score > bestScore) {
                        bestScore = score;
                        best = move;
                    }
                }

                return best;
            }

            getHardMove(board, empty) {
                let winning = [];
                let blocking = [];
                let attacking = [];
                let defensive = [];

                for (let move of empty) {
                    const aiScore = this.getLineScore(board, move.r, move.c, 'ai');
                    const playerScore = this.getLineScore(board, move.r, move.c, 'player');

                    if (aiScore >= 4) {
                        winning.push({ move, score: aiScore * 1000 });
                    }
                    else if (playerScore >= 3) {
                        blocking.push({ move, score: playerScore * 500 });
                    }
                    else if (aiScore >= 3) {
                        attacking.push({ move, score: aiScore * 200 + this.getOpenness(board, move.r, move.c, 'ai') });
                    }
                    else {
                        const score = aiScore * 100 + playerScore * 50 + this.proximity(board, move.r, move.c) * 10;
                        defensive.push({ move, score });
                    }
                }

                if (winning.length > 0) {
                    winning.sort((a, b) => b.score - a.score);
                    return winning[0].move;
                }
                if (blocking.length > 0) {
                    blocking.sort((a, b) => b.score - a.score);
                    return blocking[0].move;
                }
                if (attacking.length > 0) {
                    attacking.sort((a, b) => b.score - a.score);
                    return attacking[0].move;
                }
                if (defensive.length > 0) {
                    defensive.sort((a, b) => b.score - a.score);
                    return defensive[0].move;
                }

                return empty[0];
            }

            getLineScore(board, r, c, player) {
                const dirs = [[0,1], [1,0], [1,1], [1,-1]];
                let maxScore = 0;

                for (let [dr, dc] of dirs) {
                    let count = 1;

                    for (let i = 1; i < 5; i++) {
                        let nr = r + dr * i, nc = c + dc * i;
                        if (nr >= 0 && nr < 15 && nc >= 0 && nc < 15 && board[nr][nc] === player) {
                            count++;
                        } else break;
                    }

                    for (let i = 1; i < 5; i++) {
                        let nr = r - dr * i, nc = c - dc * i;
                        if (nr >= 0 && nr < 15 && nc >= 0 && nc < 15 && board[nr][nc] === player) {
                            count++;
                        } else break;
                    }

                    maxScore = Math.max(maxScore, count);
                }

                return maxScore;
            }

            getOpenness(board, r, c, player) {
                const dirs = [[0,1], [1,0], [1,1], [1,-1]];
                let totalOpenness = 0;

                for (let [dr, dc] of dirs) {
                    let openCount = 0;
                    
                    if (this.isValid(r + dr, c + dc) && board[r + dr][c + dc] === player) {
                        openCount++;
                    }
                    
                    if (this.isValid(r - dr, c - dc) && board[r - dr][c - dc] === player) {
                        openCount++;
                    }

                    totalOpenness += openCount;
                }

                return totalOpenness;
            }

            proximity(board, r, c) {
                let count = 0;
                for (let dr = -2; dr <= 2; dr++) {
                    for (let dc = -2; dc <= 2; dc++) {
                        if (dr === 0 && dc === 0) continue;
                        let nr = r + dr, nc = c + dc;
                        if (this.isValid(nr, nc) && board[nr][nc] !== null) {
                            count += (3 - Math.max(Math.abs(dr), Math.abs(dc)));
                        }
                    }
                }
                return count;
            }

            isValid(r, c) {
                return r >= 0 && r < 15 && c >= 0 && c < 15;
            }

            checkWin(board, r, c, player) {
                return this.getLineScore(board, r, c, player) >= 5;
            }
        }

        class Game {
            constructor() {
                this.board = Array(15).fill(null).map(() => Array(15).fill(null));
                this.ai = new AI('medium');
                this.gameOver = false;
                this.turn = 'player';
                this.render();
                this.attachListeners();
            }

            attachListeners() {
                document.getElementById('newGameBtn').addEventListener('click', () => this.reset());
                document.getElementById('difficulty').addEventListener('change', (e) => {
                    this.ai.setDifficulty(e.target.value);
                });
            }

            reset() {
                this.board = Array(15).fill(null).map(() => Array(15).fill(null));
                this.gameOver = false;
                this.turn = 'player';
                document.getElementById('result').classList.remove('show');
                this.render();
                this.updateStatus('Your Turn');
            }

            render() {
                const boardEl = document.getElementById('board');
                boardEl.innerHTML = '';

                for (let r = 0; r < 15; r++) {
                    for (let c = 0; c < 15; c++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        
                        if (this.board[r][c] === 'player') {
                            cell.textContent = '●';
                            cell.style.color = 'black';
                        } else if (this.board[r][c] === 'ai') {
                            cell.textContent = '○';
                            cell.style.color = 'black';
                        }

                        cell.addEventListener('click', () => this.playerMove(r, c));
                        boardEl.appendChild(cell);
                    }
                }
            }

            playerMove(r, c) {
                if (this.gameOver || this.board[r][c] !== null || this.turn !== 'player') return;

                this.board[r][c] = 'player';
                this.render();

                if (this.ai.checkWin(this.board, r, c, 'player')) {
                    this.endGame('🎉 You Win!');
                    return;
                }

                this.turn = 'ai';
                this.updateStatus('AI thinking...');
                setTimeout(() => this.aiMove(), 500);
            }

            aiMove() {
                const move = this.ai.getBestMove(this.board);
                if (!move) {
                    this.endGame('Draw!');
                    return;
                }

                this.board[move.r][move.c] = 'ai';
                this.render();

                if (this.ai.checkWin(this.board, move.r, move.c, 'ai')) {
                    this.endGame('💀 AI Wins!');
                    return;
                }

                this.turn = 'player';
                this.updateStatus('Your Turn');
            }

            endGame(msg) {
                this.gameOver = true;
                document.getElementById('resultText').textContent = msg;
                document.getElementById('result').classList.add('show');
            }

            updateStatus(msg) {
                document.getElementById('gameStatus').textContent = msg;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new Game();
        });
    </script>
